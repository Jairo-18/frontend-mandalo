# Config nginx de la versión WEB (SPA de expo-router, output "single").
# La sirve el contenedor de Dockerfile.web en Dokploy
# (dominio: mandalofront.ecohotelsamawe.com, HTTPS lo termina Cloudflare/Traefik).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # El bundle JS pesa ~3.4MB — comprimido queda en ~900KB.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Los bundles JS/CSS de Expo llevan hash en el nombre → cache larga.
  location /_expo/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA: cualquier ruta (/home, /orders/5, /admin/...) sirve el index.html
  # y expo-router resuelve en el cliente. El index NO se cachea (cada deploy
  # trae bundles nuevos referenciados desde él).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
